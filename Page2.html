<!DOCTYPE html>
<html>
<head>
    <title>Ambiyil Family Tree</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
        }

        .wrapper {
            overflow-x: auto;   /* enables horizontal scroll on mobile */
            padding: 20px;
        }

        .container {
            min-width: 900px;   /* prevents collapsing */
            margin: auto;
        }

        .row {
            display: flex;
            align-items: center;
            margin: 30px 0;
        }

        .box {
            border: 2px solid black;
            padding: 10px 15px;
            background: white;
            border-radius: 6px;
            font-weight: bold;
            text-align: center;
            min-width: 140px;
            transition: 0.3s;
        }

        .box:hover {
            background: lightblue;
        }

        a {
            text-decoration: none;
            color: black;
        }

        .line {
            height: 2px;
            background: black;
            width: 80px;
            margin: 0 10px;
            position: relative;
        }

        .line::after {
            content: "➜";
            position: absolute;
            right: -10px;
            top: -10px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="wrapper">
<div class="container">

    <!-- Top -->
    <div class="row">
        <a href="sivadasan.html"><div class="box">Sivadasan × Vijaya Lekshmi</div></a>
    </div>

    <!-- Santosh -->
    <div class="row">
        <a href="santosh.html"><div class="box">Santosh × Alka</div></a>
        <div class="line"></div>
        <a href="anu.html"><div class="box">Anu</div></a>
        <div class="line"></div>
        <a href="lekshmi.html"><div class="box">Lekshmi</div></a>
    </div>

    <!-- Vinod -->
    <div class="row">
        <a href="vinod.html"><div class="box">Vinod × Shiny</div></a>
        <div class="line"></div>
        <a href="ashwin.html"><div class="box">Ashwin</div></a>
        <div class="line"></div>
        <a href="asha.html"><div class="box">Asha</div></a>
    </div>

    <!-- Pradeep -->
    <div class="row">
        <a href="pradeep.html"><div class="box">Pradeep × Deepa</div></a>
        <div class="line"></div>
        <a href="pranav.html"><div class="box">Pranav</div></a>
        <div class="line"></div>
        <a href="vidhya.html"><div class="box">Vidhya</div></a>
    </div>

    <!-- Pramod -->
    <div class="row">
        <a href="pramod.html"><div class="box">Pramod × Divya</div></a>
        <div class="line"></div>
        <a href="jaya.html"><div class="box">Jaya</div></a>
        <div class="line"></div>
        <a href="bhagya.html"><div class="box">Bhagya</div></a>
    </div>

</div>
</div>

</body>
</html>
