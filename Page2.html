        }

        .level {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .box {
            border: 2px solid black;
            padding: 10px 15px;
            margin: 10px;
            background: white;
            border-radius: 8px;
            font-weight: bold;
            min-width: 120px;
            transition: 0.3s;
        }

        .box:hover {
            background: lightblue;
            cursor: pointer;
        }

        a {
            text-decoration: none;
            color: black;
        }

        .line {
            width: 2px;
            height: 30px;
            background: black;
            margin: auto;
        }

        .horizontal-line {
            height: 2px;
            background: black;
            width: 80%;
            margin: auto;
        }

        @media (max-width: 600px) {
            .level {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
