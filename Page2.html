<!DOCTYPE html>
<html>
<head>
    <title>Ambiyil Family Tree</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .row {
            display: flex;
            align-items: center;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .box {
            border: 2px solid black;
            padding: 10px 15px;
            background: white;
            border-radius: 6px;
            font-weight: bold;
            text-align: center;
            min-width: 140px;
            transition: 0.3s;
        }

        .box:hover {
            background: lightblue;
        }

        a {
            text-decoration: none;
            color: black;
        }

        .line {
            height: 2px;
            background: black;
            flex: 1;
            margin: 0 10px;
        }

        .arrow::after {
            content: "➜";
            margin-left: 5px;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .row {
                flex-direction: column;
                align-items: flex-start;
            }

            .line {
                width: 2px;
                height: 20px;
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Top -->
    <div class="row">
        <a href="sivadasan.html"><div class="box">Sivadasan × Vijaya Lekshmi</div></a>
    </div>

        <div class="line arrow"></div>

        <div class="line arrow"></div>
        <a href="lekshmi.html"><div class="box">Lekshmi</div></a>
    </div>

    <!-- Vinod -->

        <div class="line arrow"></div>
        <a href="ashwin.html"><div class="box">Ashwin</div></a>
        <div class="line arrow"></div>
        <a href="asha.html"><div class="box">Asha</div></a>
    </div>

    <!-- Pradeep -->
    <div class="row">
        <a href="pradeep.html"><div class="box">Pradeep × Deepa</div></a>
        <div class="line arrow"></div>
        <a href="pranav.html"><div class="box">Pranav</div></a>
        <div class="line arrow"></div>
        <a href="vidhya.html"><div class="box">Vidhya</div></a>
