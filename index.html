<!DOCTYPE html>
<html>
<head>
    <title>My Second Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        header {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
        }

        .container {
            margin-top: 80px;
        }

        h1 {
            font-size: 50px;
        }

        p {
            font-size: 18px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            background: white;
            color: #333;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #ddd;
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

<header>
    My Website 🚀
</header>

<div class="container">
    <h1>Hello, I'm Ashwin 👋</h1>
    <p>Welcome to my first website hosted on GitHub Pages!</p>

    <button onclick="showMessage()">Click Me</button>
</div>

<footer>
    © 2026 My Website
</footer>

<script>
    function showMessage() {
        alert("Welcome to my website! 🎉");
    }
</script>

</body>
</html>
